<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowButler - 관리자 승인</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="app-body">
  <main class="app-shell">
    <div class="app-bg admin-bg">
      <div class="page-topbar admin-topbar">
        <a href="/dashboard.html" class="back-link">‹ Dashboard</a>
      </div>

      <div class="brand-wrap">
        <div class="brand-logo">FLOWBUTLER</div>
      </div>

      <section class="center-card admin-card">
        <div class="status-badge approved-badge">ADMIN</div>
        <h1 class="page-title">회원가입/계정 관리</h1>
        <p class="page-subtitle">가입 승인/반려와 계정 삭제 관리를 분리해서 운영할 수 있습니다.</p>

        <div class="admin-mode-tabs">
          <button id="review-mode-btn" class="secondary-btn admin-mode-btn is-active">가입 승인/반려</button>
          <button id="delete-mode-btn" class="secondary-btn admin-mode-btn">계정 삭제 관리</button>
        </div>

        <div class="admin-toolbar">
          <input id="search-input" class="admin-search-input" type="text" placeholder="이메일 검색" />
          <button id="search-btn" class="secondary-btn">검색</button>
          <button id="refresh-btn" class="secondary-btn">목록 새로고침</button>
          <button id="logout-btn" class="secondary-btn">로그아웃</button>
        </div>

        <div id="admin-status" class="info-block">확인 중...</div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>이메일</th>
                <th>상태</th>
                <th>플랜</th>
                <th>역할</th>
                <th>신청일</th>
                <th>처리</th>
              </tr>
            </thead>
            <tbody id="pending-users-body">
              <tr>
                <td colspan="6" class="admin-empty">목록을 불러오는 중입니다...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="./js/admin.js"></script>
</body>

</html>
