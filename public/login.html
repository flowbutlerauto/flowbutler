<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowButler - 로그인</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="login-body">
  <main class="login-shell">
    <div class="login-bg">
      <div class="login-topbar">
        <a href="/login.html" class="back-link">‹ Login page</a>
      </div>

      <div class="brand-wrap">
        <div class="brand-logo">FLOWBUTLER</div>
      </div>

      <section class="login-card">
        <h1 class="login-title">Welcome Back!</h1>
        <p class="login-subtitle">로그인 후 FlowButler를 이용해보세요.</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" />
        </div>

        <div class="auth-actions">
          <button id="login-btn" class="primary-btn">로그인</button>
          <button id="move-signup-btn" class="secondary-btn">회원가입 하러 가기</button>
        </div>

        <div class="auth-helper">
          아직 계정이 없으신가요?
          <a href="/signup.html" class="inline-link">회원가입</a>
        </div>

        <div id="user-info" class="user-info">로그인 안 됨</div>
        <div id="status" class="status-box"></div>
      </section>
    </div>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>

</html>
